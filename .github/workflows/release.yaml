name: Release

on:
	push:
		tags:
			- "v*"

jobs:
	build:
		strategy:
			matrix:
				include:
					- os: ubuntu-latest
						target: x86_64-unknown-linux-gnu
						name: smake-linux-x64
					- os: macos-latest
						target: x86_64-apple-darwin
						name: smake-macos-x64
					- os: macos-latest
						target: aarch64-apple-darwin
						name: smake-macos-arm64
					- os: windows-latest
						target: x86_64-pc-windows-msvc
						name: smake-windows-x64.exe
		runs-on: ${{ matrix.os }}
		steps:
			- uses: actions/checkout@v4
			- uses: denoland/setup-deno@v2
			- run: deno compile --allow-read --allow-write --allow-env --allow-ffi --target ${{ matrix.target }} --output dist/${{ matrix.name }} src/cli.ts
			- uses: actions/upload-artifact@v4
				with:
					name: ${{ matrix.name }}
					path: dist/${{ matrix.name }}

	release:
		needs: build
		runs-on: ubuntu-latest
		permissions:
			contents: write
		steps:
			- uses: actions/download-artifact@v4
				with:
					path: dist
			- run: |
					mkdir release
					find dist -type f -exec mv {} release/ \;
			- uses: softprops/action-gh-release@v2
				with:
					files: release/*
					generate_release_notes: true